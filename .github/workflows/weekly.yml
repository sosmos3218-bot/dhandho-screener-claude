# 매주 전체(미국+한국+일본) Dhandho 스크리닝 → 스냅샷 → 퍼블리시 → 뉴스레터(무료/유료) 발송
#
# test-cloud-scan.yml 로 실측 검증됨(2026-07-05): 한국(pykrx) 11/11, 미국(yfinance) 40/40
# 성공 — "GitHub IP에서 pykrx가 막힌다"던 이전 가정은 근거 없음으로 확인되어 전체 스캔으로 전환.
#
# [필요한 GitHub Secrets]  (Settings → Secrets and variables → Actions)
#   BREVO_API_KEY        Brevo API 키
#   BREVO_PAID_LIST_ID   유료판 리스트 ID
#   BREVO_FREE_LIST_ID   무료판 리스트 ID
#   BREVO_SENDER_EMAIL   뉴스레터 발신자 이메일
#   BREVO_SENDER_NAME    뉴스레터 발신자 이름
#   HF_TOKEN             Hugging Face 계정 settings/tokens 에서 발급(Write 권한, 이 Space 대상)
#                         — 없으면 GitHub 에는 정상 반영되고 HF Space 반영만 건너뜀

name: weekly-dhandho-full-scan

on:
  schedule:
    # cron 은 UTC 기준. 월요일 08:00 KST = 일요일 23:00 UTC.
    - cron: "0 23 * * 0"
  workflow_dispatch:
    inputs:
      send_newsletter:
        description: "실제 구독자에게 뉴스레터까지 발송할지 (테스트 실행은 false 권장)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: weekly-dhandho-full
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v7

      - name: 파이썬 설정
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install --quiet -r requirements.txt

      - name: 전체 스캔(US+KR+JP) → 스냅샷 → 퍼블리시 → 뉴스레터(예약 실행 또는 send_newsletter=true 일 때만 Brevo 발송)
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_PAID_LIST_ID: ${{ secrets.BREVO_PAID_LIST_ID }}
          BREVO_FREE_LIST_ID: ${{ secrets.BREVO_FREE_LIST_ID }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
          BREVO_SENDER_NAME: ${{ secrets.BREVO_SENDER_NAME }}
          SHOULD_SEND: ${{ github.event_name == 'schedule' || inputs.send_newsletter == true }}
        run: |
          if [ "$SHOULD_SEND" = "true" ]; then
            python weekly_run.py
          else
            echo "ℹ️ 수동 실행(send_newsletter=false) — 스캔/스냅샷/퍼블리시만 하고 발송은 건너뜁니다."
            python weekly_run.py --no-send
          fi

      - name: published/snapshots 변경분 커밋 → GitHub(origin)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add published snapshots
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "data: weekly publish $(date -u +%Y-%m-%d)"
            git push origin HEAD:main
          fi

      - name: Hugging Face Space에도 반영
        if: always()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "ℹ️ HF_TOKEN 미설정 — HF Space push 생략 (GitHub 반영은 완료됨)"
            exit 0
          fi
          git remote add hf "https://sosmos:${HF_TOKEN}@huggingface.co/spaces/sosmos/dhandho-screener" 2>/dev/null \
            || git remote set-url hf "https://sosmos:${HF_TOKEN}@huggingface.co/spaces/sosmos/dhandho-screener"
          # 간헐적 일시 오류 대비 최대 3회 재시도(4초 간격)
          for attempt in 1 2 3; do
            git fetch hf main -q || true
            if git push hf HEAD:main; then
              exit 0
            fi
            echo "⚠️ HF push 실패 (시도 $attempt/3) — 4초 후 재시도"
            sleep 4
          done
          echo "❌ HF push 3회 모두 실패 — GitHub 반영은 완료되어 있으니 수동으로 'git push hf main' 필요"
          exit 1

      - name: 산출물 업로드 (뉴스레터 + 스냅샷, 디버깅용)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dhandho-weekly
          path: |
            newsletter/
            snapshots/
          if-no-files-found: warn
