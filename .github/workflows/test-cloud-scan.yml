# 진단용 1회성 테스트: GitHub Actions(해외 클라우드 IP)에서 실제 data.py 수집 경로가
# "실전 규모"로도 안 막히는지 확인한다. 정기 스캔 파이프라인이 아니라 "이전 가능 여부
# 판단"용 — 수동 실행만 한다.
#
# 1단계(단일 종목) 테스트는 통과했으나, 레이트리밋은 보통 요청량이 쌓여야 걸리므로
# 이번엔 한국 워치리스트 전체 + 미국 40개 종목을 data.fetch_kr/fetch_us 로 순회 조회한다
# (실제 weekly_run.py 가 쓰는 것과 동일한 함수 — sleep(0.2) 페이싱 포함).
#
# 결과 확인: Actions 탭 → test-cloud-scan → 최근 실행 → "실전 규모 수집 테스트" step 로그.
# 실행 방법: Actions 탭 → test-cloud-scan → Run workflow.

name: test-cloud-scan

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install --quiet pykrx yfinance pandas

      - name: 실전 규모 수집 테스트 (한국 전체 + 미국 40개, 실제 data.py 경로)
        run: |
          python - <<'PY'
          import sys
          import time

          import config
          import data

          started = time.time()

          print(f"=== 한국 워치리스트 전체 ({len(config.all_kr())}종목) — data.fetch_kr ===")
          kr_ok = []
          for code, info in config.all_kr():
              row = data.fetch_kr(code, info, use_cache=False)
              ok = row.get("market_cap") is not None and not row.get("error")
              kr_ok.append(ok)
              mark = "✅" if ok else "❌"
              print(f"{mark} KR {code} {info.get('name')}: "
                    f"market_cap={row.get('market_cap')} error={row.get('error')}")

          us_tickers = config.all_us()[:40]
          print(f"\n=== 미국 상위 {len(us_tickers)}종목 — data.fetch_us ===")
          us_ok = []
          for t in us_tickers:
              row = data.fetch_us(t, use_cache=False)
              ok = row.get("market_cap") is not None and not row.get("error")
              us_ok.append(ok)
              mark = "✅" if ok else "❌"
              print(f"{mark} US {t}: market_cap={row.get('market_cap')} error={row.get('error')}")

          elapsed = time.time() - started
          kr_rate = sum(kr_ok) / len(kr_ok) if kr_ok else 0
          us_rate = sum(us_ok) / len(us_ok) if us_ok else 0

          print(f"\n=== 요약 ({elapsed:.0f}초 소요) ===")
          print(f"한국: {sum(kr_ok)}/{len(kr_ok)} 성공 ({kr_rate:.0%})")
          print(f"미국: {sum(us_ok)}/{len(us_ok)} 성공 ({us_rate:.0%})")

          # 완전 실패만 명확한 차단으로 보고, 간헐적 결측(90%+)은 정상 범위로 허용.
          if kr_rate < 0.9:
              print("⚠️ 한국(pykrx/yfinance .KS) 실전 규모에서 불안정 — 로컬/국내 IP 유지 권장")
          if us_rate < 0.9:
              print("⚠️ 미국(yfinance) 실전 규모에서 레이트리밋 의심 — 배치 크기·간격 조정 필요")

          sys.exit(0 if (kr_rate >= 0.9 and us_rate >= 0.9) else 1)
          PY

      - name: 결과 요약
        if: always()
        run: |
          echo "위 step 이 ✅ 로 끝났으면 GitHub Actions 이전이 실전 규모로도 가능해 보입니다."
          echo "❌ 로 끝났으면 로그의 실패 종목/사유를 보고 로컬 유지 또는 하이브리드를 검토하세요."
